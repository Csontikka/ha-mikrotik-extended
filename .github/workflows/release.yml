name: Release

on:
  release:
    types: [published]

jobs:

  release_zip:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Zip mikrotik_extended dir
        run: |
          cd ${{ github.workspace }}/custom_components/mikrotik_extended
          zip mikrotik_extended.zip -r ./

      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/mikrotik_extended/mikrotik_extended.zip
          asset_name: mikrotik_extended.zip
          tag: ${{ github.ref }}
          overwrite: true
